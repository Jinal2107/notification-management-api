databaseChangeLog:
  - changeSet:
      id: 001-create-notification-table
      author: antigravity
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: retry_count
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: schedule_time
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_retry_time
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_notifications_status
            tableName: notifications
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_notifications_type
            tableName: notifications
            columns:
              - column:
                  name: type
        - createIndex:
            indexName: idx_notifications_user_id
            tableName: notifications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_notifications_created_at
            tableName: notifications
            columns:
              - column:
                  name: created_at
        - createIndex:
            indexName: uidx_notifications_dup_val
            tableName: notifications
            unique: true
            columns:
              - column:
                  name: user_id
              - column:
                  name: type
              - column:
                  name: message
              - column:
                  name: created_at
